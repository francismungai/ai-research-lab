<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | USD AI Research</title>
    <link rel="stylesheet" href="css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="font-sans text-gray-900 bg-cover bg-center bg-fixed bg-no-repeat"
    style="background-image: url(&quot;assets/building-bg.jpeg&quot;)"
  >
    <div id="navbar-placeholder" class="min-h-16 sticky top-0 z-50"></div>

    <div
      class="py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center min-h-[calc(100vh-8rem)]"
    >
      <main
        class="w-full max-w-md bg-white/70 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 p-8 md:p-10 mb-6"
      >
        <div class="text-center mb-6">
          <h1
            class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight"
          >
            Reset Password
          </h1>
          <p class="text-sm font-medium text-gray-600 mt-2">
            Set a new password for your account
          </p>
        </div>

        <div
          class="bg-blue-50 border border-blue-100 text-blue-700 px-4 py-3 rounded-xl text-sm font-medium mb-6"
        >
          Enter your email and choose a new password.
        </div>

        <form class="space-y-5" onsubmit="event.preventDefault()">
          <div>
            <label
              class="block text-sm font-bold text-gray-700 mb-1.5"
              for="email"
            >
              USD Email Address
            </label>
            <input
              id="email"
              type="email"
              placeholder="your.name@usd.edu"
              required
              class="w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors"
            />
          </div>

          <div>
            <label
              class="block text-sm font-bold text-gray-700 mb-1.5"
              for="new-password"
            >
              New Password
            </label>
            <div class="relative">
              <input
                id="new-password"
                type="password"
                placeholder="Minimum 6 characters"
                required
                class="w-full pl-4 pr-10 py-3 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors"
              />
              <button
                type="button"
                class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-[#C53030] transition-colors rounded-full focus:outline-none focus:ring-2 focus:ring-[#C53030]/50"
                data-target="new-password"
              >
                <i class="bx bx-show text-xl"></i>
              </button>
            </div>
          </div>

          <div>
            <label
              class="block text-sm font-bold text-gray-700 mb-1.5"
              for="confirm-new-password"
            >
              Confirm New Password
            </label>
            <div class="relative">
              <input
                id="confirm-new-password"
                type="password"
                placeholder="Re-enter new password"
                required
                class="w-full pl-4 pr-10 py-3 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors"
              />
              <button
                type="button"
                class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-[#C53030] transition-colors rounded-full focus:outline-none focus:ring-2 focus:ring-[#C53030]/50"
                data-target="confirm-new-password"
              >
                <i class="bx bx-show text-xl"></i>
              </button>
            </div>
          </div>

          <div>
            <label
              class="block text-sm font-bold text-gray-700 mb-1.5"
              for="password-hint"
            >
              New Password Hint
              <span class="text-gray-400 font-normal">(optional)</span>
            </label>
            <input
              id="password-hint"
              type="text"
              placeholder="A hint to help you remember"
              class="w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors"
            />
          </div>

          <button
            type="submit"
            class="w-full py-3 px-4 mt-4 bg-linear-to-r from-red-800 to-gray-900 text-white font-medium rounded-xl hover:from-red-700 hover:to-gray-800 focus:outline-none focus:ring-4 focus:ring-red-200 transition-all shadow-md hover:shadow-lg"
          >
            Reset Password
          </button>

          <div class="text-center pt-4">
            <a
              href="login.html"
              class="text-gray-500 hover:text-gray-800 font-medium text-sm transition-colors"
            >
              Back to sign in
            </a>
          </div>
        </form>
      </main>

      <a
        href="blog.html"
        class="inline-flex items-center text-gray-700 hover:text-gray-900 font-medium transition-colors bg-white/40 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm border border-white/30"
      >
        <i class="bx bx-chevron-left text-lg mr-1"></i> Back to Blog
      </a>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/reset-password.js"></script>
    <script src="js/loader.js"></script>
  </body>
</html>
