<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Artificial Intelligence Symposium banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f2"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#991b1b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <filter id="accentShadow" x="-30%" y="-30%" width="160%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#991b1b" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="400" height="240" rx="18" fill="url(#bg)"/>

  <!-- Unique design: concentric "signal" arcs + highlight arc -->
  <g opacity="0.22" stroke="#111827" stroke-width="2">
    <path d="M62 196c0-66.3 53.7-120 120-120"/>
    <path d="M62 196c0-49.7 40.3-90 90-90"/>
    <path d="M62 196c0-33.1 26.9-60 60-60"/>
  </g>
  <g opacity="0.12" stroke="#ef4444" stroke-width="6" filter="url(#accentShadow)">
    <path d="M34 206c0-88.4 71.6-160 160-160"/>
  </g>

  <g opacity="0.35" fill="#111827">
    <circle cx="338" cy="54" r="2"/>
    <circle cx="350" cy="54" r="2"/>
    <circle cx="362" cy="54" r="2"/>
    <circle cx="338" cy="66" r="2"/>
    <circle cx="350" cy="66" r="2"/>
    <circle cx="362" cy="66" r="2"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="28" y="54" width="344" height="132" rx="16" fill="#ffffff"/>
    <rect x="28" y="54" width="344" height="132" rx="16" fill="none" stroke="#e5e7eb"/>
  </g>

  <rect x="28" y="54" width="6" height="132" rx="3" fill="url(#accent)"/>

  <text x="52" y="95" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="22" font-weight="700" fill="#111827">Artificial Intelligence</text>
  <text x="52" y="120" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="22" font-weight="700" fill="#111827">Symposium</text>

  <g>
    <rect x="52" y="135" width="60" height="26" rx="13" fill="#111827"/>
    <text x="68" y="153" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="0.08em">USD</text>
  </g>

  <g>
    <circle cx="352" cy="156" r="6" fill="#ef4444" opacity="0.9">
      <animate attributeName="r" values="6;8;6" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.45;0.9" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="352" cy="156" r="2" fill="#ffffff"/>
  </g>
</svg>
