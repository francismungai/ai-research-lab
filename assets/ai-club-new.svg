<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Artificial Intelligence Club banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf5ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="400" height="240" rx="18" fill="url(#bg)"/>

  <!-- Unique design: sticker-like "tiles" cluster -->
  <g opacity="0.22" stroke="#111827" stroke-width="2">
    <rect x="304" y="26" width="56" height="36" rx="10" fill="#ffffff"/>
    <rect x="326" y="54" width="44" height="34" rx="10" fill="#ffffff"/>
    <rect x="294" y="72" width="56" height="40" rx="12" fill="#ffffff"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="28" y="54" width="344" height="132" rx="16" fill="#ffffff"/>
    <rect x="28" y="54" width="344" height="132" rx="16" fill="none" stroke="#e5e7eb"/>
  </g>

  <!-- Accent stripe with notch -->
  <path d="M28 54h12v132H28z" fill="url(#accent)"/>
  <path d="M40 102h10l-10 10v-10z" fill="#111827" opacity="0.22"/>

  <text x="58" y="95" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="800" fill="#111827">Artificial Intelligence</text>
  <text x="58" y="120" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="800" fill="#111827">Club</text>

  <g>
    <rect x="58" y="135" width="60" height="26" rx="13" fill="#111827"/>
    <text x="74" y="153" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="0.08em">USD</text>
  </g>

  <!-- Animated cursor underline -->
  <rect x="58" y="127" width="0" height="3" rx="1.5" fill="#a78bfa" opacity="0.9">
    <animate attributeName="width" values="0;50;0" dur="2.8s" repeatCount="indefinite"/>
  </rect>
</svg>
