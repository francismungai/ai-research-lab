<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="2AI Conference banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="400" height="240" rx="18" fill="url(#bg)"/>

  <!-- Unique design: interlocking rings (applied AI) -->
  <g opacity="0.20" fill="none" stroke="#111827" stroke-width="3">
    <circle cx="314" cy="72" r="28"/>
    <circle cx="348" cy="96" r="28"/>
    <path d="M298 156h74"/>
    <path d="M298 168h54"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="28" y="54" width="344" height="132" rx="16" fill="#ffffff"/>
    <rect x="28" y="54" width="344" height="132" rx="16" fill="none" stroke="#e5e7eb"/>
  </g>

  <rect x="28" y="54" width="6" height="132" rx="3" fill="url(#accent)"/>

  <text x="52" y="90" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="18" font-weight="900" fill="#111827">Applied Artificial</text>
  <text x="52" y="112" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="18" font-weight="900" fill="#111827">Intelligence Conference</text>

  <g>
    <rect x="52" y="125" width="140" height="26" rx="13" fill="#111827"/>
    <text x="64" y="143" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="12" font-weight="900" fill="#ffffff" letter-spacing="0.08em">INTERNATIONAL</text>
  </g>

  <!-- Animated linking highlight between rings -->
  <path d="M332 84c-10 2-18 6-24 12" stroke="#fb7185" stroke-width="3" opacity="0.0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite"/>
  </path>
</svg>
