<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Big Data Africa Symposium banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="400" height="240" rx="18" fill="url(#bg)"/>

  <!-- Unique design: "data skyline" bars -->
  <g opacity="0.22" fill="#111827">
    <rect x="36" y="160" width="10" height="44" rx="3"/>
    <rect x="54" y="144" width="10" height="60" rx="3"/>
    <rect x="72" y="170" width="10" height="34" rx="3"/>
    <rect x="90" y="132" width="10" height="72" rx="3"/>
    <rect x="108" y="152" width="10" height="52" rx="3"/>
    <rect x="126" y="120" width="10" height="84" rx="3"/>
    <rect x="144" y="156" width="10" height="48" rx="3"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="28" y="54" width="344" height="132" rx="16" fill="#ffffff"/>
    <rect x="28" y="54" width="344" height="132" rx="16" fill="none" stroke="#e5e7eb"/>
  </g>

  <rect x="28" y="54" width="6" height="132" rx="3" fill="url(#accent)"/>

  <text x="52" y="100" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="20" font-weight="900" fill="#111827">Big Data Africa</text>
  <text x="52" y="126" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="20" font-weight="900" fill="#111827">Symposium</text>

  <g>
    <rect x="52" y="140" width="140" height="26" rx="13" fill="#111827"/>
    <text x="64" y="158" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="0.08em">INTERNATIONAL</text>
  </g>

  <!-- Animated golden "spark" -->
  <g>
    <circle cx="352" cy="78" r="3" fill="#f59e0b" opacity="0.85">
      <animate attributeName="r" values="3;5;3" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.4;0.85" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
