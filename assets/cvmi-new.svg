<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CVMI Conference banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#166534"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="400" height="240" rx="18" fill="url(#bg)"/>

  <!-- Unique design: "vision" frame + crosshair -->
  <g opacity="0.20" stroke="#111827" stroke-width="2" fill="none">
    <rect x="280" y="28" width="92" height="92" rx="14"/>
    <path d="M326 28v20M372 74h-20M326 120v-20M280 74h20"/>
    <circle cx="326" cy="74" r="14"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="28" y="54" width="344" height="132" rx="16" fill="#ffffff"/>
    <rect x="28" y="54" width="344" height="132" rx="16" fill="none" stroke="#e5e7eb"/>
  </g>

  <rect x="28" y="54" width="6" height="132" rx="3" fill="url(#accent)"/>

  <text x="52" y="88" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="16" font-weight="800" fill="#111827">Computer Vision and</text>
  <text x="52" y="108" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="16" font-weight="800" fill="#111827">Machine Intelligence</text>
  <text x="52" y="128" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="16" font-weight="800" fill="#111827">Conference</text>

  <g>
    <rect x="52" y="140" width="140" height="26" rx="13" fill="#111827"/>
    <text x="64" y="158" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="0.08em">INTERNATIONAL</text>
  </g>

  <!-- Animated scanning line in the "viewfinder" -->
  <rect x="286" y="34" width="80" height="2" fill="#22c55e" opacity="0.85">
    <animate attributeName="y" values="34;114;34" dur="3.0s" repeatCount="indefinite"/>
  </rect>
</svg>
