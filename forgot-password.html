<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | USD AI Research</title>
    <link rel="stylesheet" href="css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
      <link rel="preload" as="image" href="assets/icons/logo-BHzomKBk.svg" />
    <link rel="preload" as="image" href="assets/backgrounds/building-bg.webp" />
</head>
  <body
    class="font-sans text-gray-900 bg-cover bg-center bg-fixed bg-no-repeat"
    style="background-image: url(&quot;assets/backgrounds/building-bg.webp&quot;)"
  >
    <div id="navbar-placeholder" class="min-h-16 sticky top-0 z-50"></div>

    <div
      class="py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center min-h-[calc(100vh-8rem)]"
    >
      <main
        class="w-full max-w-md bg-white/70 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 p-8 md:p-10 mb-6"
      >
        <div class="text-center mb-8">
          <h1
            class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight"
          >
            Forgot Password
          </h1>
          <p class="text-sm font-medium text-gray-600 mt-2">
            Retrieve your password hint or contact an admin
          </p>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault()">
          <div>
            <label
              class="block text-sm font-bold text-gray-700 mb-1.5"
              for="email"
            >
              USD Email Address
            </label>
            <input
              id="email"
              type="email"
              placeholder="your.name@usd.edu"
              required
              class="w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors"
            />
          </div>

          <button
            type="submit"
            class="w-full py-3 px-4 bg-linear-to-r from-red-800 to-gray-900 text-white font-medium rounded-xl hover:from-red-700 hover:to-gray-800 focus:outline-none focus:ring-4 focus:ring-red-200 transition-all shadow-md hover:shadow-lg"
          >
            Get Password Hint
          </button>

          <div class="flex flex-col items-center gap-3 pt-2">
            <a
              href="reset-password.html"
              class="text-[#C53030] hover:text-red-800 font-medium text-sm transition-colors"
            >
              Still can't remember? Reset password
            </a>
            <a
              href="login.html"
              class="text-gray-500 hover:text-gray-800 font-medium text-sm transition-colors"
            >
              Back to sign in
            </a>
          </div>
        </form>
      </main>

      <a
        href="blog.html"
        class="inline-flex items-center text-gray-700 hover:text-gray-900 font-medium transition-colors bg-white/40 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm border border-white/30"
      >
        <i class="bx bx-chevron-left text-lg mr-1"></i> Back to Blog
      </a>
    </div>

    <div id="footer-placeholder"></div>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase-config.js"></script>
    <script defer src="js/toast.js"></script>
    <script defer src="js/navbar.js"></script>
    <script defer src="js/forgot-password.js"></script>
    <script defer src="js/loader.js"></script>
  </body>
</html>
