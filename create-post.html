<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post | USD AI Research</title>
    <link rel="stylesheet" href="css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* Markdown preview styles */
      .prose h1 {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        color: #111827;
      }
      .prose h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        color: #111827;
      }
      .prose h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
        color: #111827;
      }
      .prose p {
        margin-bottom: 1rem;
        line-height: 1.75;
        color: #374151;
      }
      .prose ul,
      .prose ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }
      .prose ul {
        list-style-type: disc;
      }
      .prose ol {
        list-style-type: decimal;
      }
      .prose li {
        margin-bottom: 0.25rem;
        line-height: 1.75;
        color: #374151;
      }
      .prose code {
        background: #f3f4f6;
        padding: 0.125rem 0.375rem;
        border-radius: 0.25rem;
        font-size: 0.875rem;
        color: #c53030;
      }
      .prose pre {
        background: #1f2937;
        color: #e5e7eb;
        padding: 1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        margin-bottom: 1rem;
      }
      .prose pre code {
        background: none;
        padding: 0;
        color: inherit;
        font-size: 0.875rem;
      }
      .prose blockquote {
        border-left: 4px solid #c53030;
        padding-left: 1rem;
        margin-bottom: 1rem;
        color: #6b7280;
        font-style: italic;
      }
      .prose a {
        color: #c53030;
        text-decoration: underline;
      }
      .prose img {
        max-width: 100%;
        border-radius: 0.75rem;
        margin: 1rem 0;
      }
      .prose hr {
        border-color: #e5e7eb;
        margin: 1.5rem 0;
      }
      .prose strong {
        font-weight: 700;
        color: #111827;
      }
      .prose table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1rem;
      }
      .prose th,
      .prose td {
        border: 1px solid #e5e7eb;
        padding: 0.5rem 0.75rem;
        text-align: left;
      }
      .prose th {
        background: #f9fafb;
        font-weight: 700;
      }

      /* Editor textarea */
      #post-content {
        tab-size: 2;
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      }
    </style>
  </head>
  <body class="font-sans text-gray-900 bg-gray-50 min-h-screen flex flex-col">
    <!-- Top bar -->
    <header
      class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm"
    >
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14"
      >
        <div class="flex items-center gap-4">
          <a
            href="blog.html"
            class="inline-flex items-center text-gray-500 hover:text-gray-900 transition-colors font-medium text-sm"
          >
            <i class="bx bx-arrow-back text-lg mr-1.5"></i>
            Back to Blog
          </a>
          <div class="hidden sm:block h-5 w-px bg-gray-200"></div>
          <span
            id="save-status"
            class="hidden sm:inline text-xs font-medium text-gray-400"
          >
            <i class="bx bx-cloud text-sm mr-1"></i>
            Unsaved
          </span>
        </div>

        <div class="flex items-center gap-2">
          <button
            id="btn-save-draft"
            class="px-3 py-1.5 text-xs font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors border border-gray-200 cursor-pointer"
          >
            Save Draft
          </button>
          <button
            id="btn-publish"
            class="px-4 py-1.5 text-xs font-bold text-white bg-[#C53030] hover:bg-red-800 rounded-lg transition-colors shadow-sm cursor-pointer"
          >
            Publish
          </button>
        </div>
      </div>
    </header>

    <!-- Main editor area -->
    <main class="flex-1 flex flex-col max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">
      <!-- Post metadata -->
      <div class="mb-6 space-y-4">
        <input
          id="post-title"
          type="text"
          placeholder="Post title..."
          class="w-full text-3xl md:text-4xl font-extrabold text-gray-900 placeholder-gray-300 bg-transparent border-none outline-none focus:ring-0"
        />

        <div class="flex flex-col sm:flex-row gap-3">
          <div class="flex-1">
            <input
              id="post-excerpt"
              type="text"
              placeholder="Write a brief excerpt or summary..."
              class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent"
            />
          </div>
          <div class="sm:w-64">
            <input
              id="post-tags"
              type="text"
              placeholder="Tags (comma-separated)"
              class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent"
            />
          </div>
        </div>

        <div>
          <input
            id="post-cover-url"
            type="text"
            placeholder="Cover image URL (optional)"
            class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent"
          />
        </div>
      </div>

      <!-- Editor mode tabs -->
      <div class="flex items-center gap-1 mb-3 border-b border-gray-200">
        <button
          id="tab-write"
          class="editor-tab px-4 py-2 text-sm font-bold border-b-2 border-[#C53030] text-[#C53030] transition-colors cursor-pointer"
        >
          <i class="bx bx-edit text-base mr-1"></i>Write
        </button>
        <button
          id="tab-preview"
          class="editor-tab px-4 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition-colors cursor-pointer"
        >
          <i class="bx bx-show text-base mr-1"></i>Preview
        </button>
        <button
          id="tab-split"
          class="editor-tab px-4 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition-colors hidden md:inline-flex cursor-pointer"
        >
          <i class="bx bx-columns text-base mr-1"></i>Split
        </button>
      </div>

      <!-- Editor panels -->
      <div id="editor-container" class="flex-1 flex gap-4 min-h-[500px]">
        <!-- Write panel -->
        <div id="panel-write" class="flex-1 flex flex-col">
          <textarea
            id="post-content"
            placeholder="Write your post in markdown...

# Example Heading

This is a paragraph with **bold** and *italic* text.

- List item 1
- List item 2

```python
print('Hello, AI Research!')
```

> A blockquote for emphasis"
            class="flex-1 w-full px-5 py-4 bg-white border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-300 resize-none focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent leading-relaxed"
          ></textarea>
        </div>

        <!-- Preview panel -->
        <div
          id="panel-preview"
          class="hidden flex-1 bg-white border border-gray-200 rounded-xl px-6 py-5 overflow-y-auto"
        >
          <div id="preview-content" class="prose max-w-none">
            <p class="text-gray-400 italic">
              Start writing to see your preview here...
            </p>
          </div>
        </div>
      </div>

      <!-- Markdown Help -->
      <details class="mt-4">
        <summary
          class="text-xs font-bold text-gray-400 cursor-pointer hover:text-gray-600 transition-colors select-none"
        >
          <i class="bx bx-help-circle mr-1"></i>Markdown Help
        </summary>
        <div
          class="mt-2 p-4 bg-white border border-gray-200 rounded-xl text-xs text-gray-600 grid grid-cols-2 md:grid-cols-4 gap-3"
        >
          <div><code class="text-[#C53030]"># H1</code> Heading 1</div>
          <div><code class="text-[#C53030]">## H2</code> Heading 2</div>
          <div><code class="text-[#C53030]">**bold**</code> <strong>bold</strong></div>
          <div><code class="text-[#C53030]">*italic*</code> <em>italic</em></div>
          <div><code class="text-[#C53030]">- item</code> Bullet list</div>
          <div><code class="text-[#C53030]">1. item</code> Numbered list</div>
          <div><code class="text-[#C53030]">[text](url)</code> Link</div>
          <div><code class="text-[#C53030]">![alt](url)</code> Image</div>
          <div><code class="text-[#C53030]">`code`</code> Inline code</div>
          <div><code class="text-[#C53030]">```lang</code> Code block</div>
          <div><code class="text-[#C53030]">> quote</code> Blockquote</div>
          <div><code class="text-[#C53030]">---</code> Horizontal rule</div>
        </div>
      </details>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/toast.js"></script>
    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/create-post.js"></script>
  </body>
</html>
