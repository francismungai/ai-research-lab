<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People | USD AI Research</title>
    <link rel="stylesheet" href="css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* Hide scrollbar for the alphabet filter but allow swiping */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="font-sans text-gray-900 bg-cover bg-center bg-fixed bg-no-repeat"
    style="background-image: url(&quot;assets/building-bg.jpeg&quot;)"
  >
    <div id="navbar-placeholder" class="min-h-16 sticky top-0 z-50"></div>

    <div class="py-4 px-4 sm:px-6 lg:px-8">
      <main
        class="max-w-7xl mx-auto px-6 py-10 md:px-12 bg-white/70 backdrop-blur-sm rounded-[2.5rem] shadow-2xl border border-white/20 min-h-[calc(100vh-8rem)] flex flex-col"
      >
        <div class="text-center mb-10">
          <h1
            class="text-4xl lg:text-5xl font-bold text-[#C53030] tracking-tight mb-4"
          >
            People
          </h1>
          <p
            class="text-gray-700 text-lg font-medium max-w-3xl mx-auto leading-relaxed"
          >
            Meet the brilliant minds behind our AI research lab - faculty,
            students, and alumni who are shaping the future of artificial
            intelligence.
          </p>
        </div>

        <div class="mb-10 space-y-6">
          <div
            class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 border-b border-gray-200 pb-6"
          >
            <span
              class="text-sm font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap"
              >Filter by:</span
            >
            <div class="flex flex-wrap gap-2">
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-[#C53030] text-white border-[#C53030]"
              >
                All
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                Faculty
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                Postdoc
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                PhD Students
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                Masters Students
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                Undergraduate
              </button>
              <button
                class="px-4 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900"
              >
                Alumni
              </button>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
            <span
              class="text-sm font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap"
              >Start with:</span
            >
            <div class="flex overflow-x-auto gap-2 hide-scrollbar pb-2 sm:pb-0">
              <button
                class="px-3 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-[#C53030] text-white border-[#C53030] shrink-0"
              >
                All
              </button>
              <script>
                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
                alphabet.forEach((letter) => {
                  document.write(
                    `<button class="px-3 py-1.5 text-sm font-bold rounded-lg transition-colors border-2 bg-gray-50 text-gray-600 border-gray-200 hover:border-gray-300 hover:text-gray-900 flex-shrink-0">${letter}</button>`,
                  );
                });
              </script>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/people.js"></script>
  </body>
</html>
