<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Publications | USD AI Research</title>
    <link rel="stylesheet" href="../css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* The Cloak: Prevents the flash of unauthenticated content */
      body {
        display: none;
      }
    </style>
      <link rel="preload" as="image" href="../assets/icons/logo-BHzomKBk.svg" />
    <link rel="preload" as="image" href="../assets/backgrounds/building-bg.webp" />
</head>
  <body
    class="font-sans text-gray-900 bg-gray-50 flex h-screen overflow-hidden"
  >
    <aside id="portal-sidebar-placeholder"></aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
      <header id="portal-header-placeholder"></header>

      <div class="flex-1 overflow-y-auto p-6 md:p-8">
        <div class="max-w-6xl mx-auto">
          <div
            class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4"
          >
            <div>
              <h1 class="text-2xl font-bold text-gray-900">Publications</h1>
              <p class="text-sm text-gray-500 mt-1">
                Manage lab papers, code links, and venues.
              </p>
            </div>
            <button
              id="add-pub-btn"
              class="bg-[#C53030] text-white px-4 py-2 rounded-md text-sm font-bold hover:bg-[#A52828] transition shadow-sm flex items-center"
            >
              <i class="bx bx-plus mr-2 text-lg"></i> Add Publication
            </button>
          </div>

          <div
            class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"
          >
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr
                    class="bg-gray-50 border-b border-gray-200 text-xs uppercase text-gray-500 tracking-wider"
                  >
                    <th class="p-4 font-semibold">Title & Authors</th>
                    <th class="p-4 font-semibold">Venue</th>
                    <th class="p-4 font-semibold">Year</th>
                    <th class="p-4 font-semibold text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="pubs-table-body" class="divide-y divide-gray-100">
                  <tr>
                    <td colspan="4" class="p-4 text-center text-gray-500">
                      Loading publications...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div
        id="pub-modal"
        class="fixed inset-0 bg-gray-900/50 z-50 hidden flex justify-end"
      >
        <div
          class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col transform transition-transform translate-x-full duration-300"
          id="pub-modal-panel"
        >
          <div
            class="flex justify-between items-center p-6 border-b border-gray-200"
          >
            <h2 id="modal-title" class="text-xl font-bold text-gray-900">
              Add Publication
            </h2>
            <button
              id="close-modal-btn"
              class="text-gray-400 hover:text-gray-600 text-2xl"
            >
              <i class="bx bx-x"></i>
            </button>
          </div>

          <div class="flex-1 overflow-y-auto p-6">
            <form id="pub-form" class="space-y-4">
              <input type="hidden" id="pub-id" />
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Title *</label
                >
                <input
                  type="text"
                  id="pub-title"
                  required
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="Paper title"
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Authors *</label
                >
                <input
                  type="text"
                  id="pub-authors"
                  required
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="e.g., K.C. Santosh, R. Rizk"
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Description</label
                >
                <textarea
                  id="pub-desc"
                  rows="3"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="Brief summary..."
                ></textarea>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Venue</label
                  >
                  <input
                    type="text"
                    id="pub-venue"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                    placeholder="e.g., CVPR, IEEE"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Year</label
                  >
                  <input
                    type="text"
                    id="pub-year"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                    placeholder="YYYY"
                  />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Paper URL</label
                >
                <input
                  type="url"
                  id="pub-paper-url"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="https://arxiv.org/..."
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Code URL</label
                >
                <input
                  type="url"
                  id="pub-code-url"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="https://github.org/..."
                />
              </div>

              <div class="flex items-center mt-2">
                <input
                  type="checkbox"
                  id="pub-is-sample"
                  class="w-4 h-4 text-[#C53030] border-gray-300 rounded focus:ring-[#C53030]"
                />
                <label
                  for="pub-is-sample"
                  class="ml-2 block text-sm text-gray-900"
                >
                  Mark as Feature Sample (Shows on homepage)
                </label>
              </div>
            </form>
          </div>

          <div
            class="p-6 border-t border-gray-200 bg-gray-50 flex justify-end gap-3"
          >
            <button
              id="cancel-modal-btn"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
            >
              Cancel
            </button>
            <button
              id="save-pub-btn"
              class="px-4 py-2 text-sm font-medium text-white bg-[#C53030] rounded-md hover:bg-[#A52828] shadow-sm flex items-center"
            >
              Save Publication
            </button>
          </div>
        </div>
      </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="../js/supabase-config.js"></script>
    <script defer src="../js/portal.js"></script>
    <script defer src="../js/manage-pubs.js"></script>
  </body>
</html>
