<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage People | USD AI Research</title>
    <link rel="stylesheet" href="../css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* The Cloak: Prevents the flash of unauthenticated content */
      body {
        display: none;
      }
    </style>
      <link rel="preload" as="image" href="../assets/icons/logo-BHzomKBk.svg" />
    <link rel="preload" as="image" href="../assets/backgrounds/building-bg.webp" />
</head>
  <body
    class="font-sans text-gray-900 bg-gray-50 flex h-screen overflow-hidden"
  >
    <aside id="portal-sidebar-placeholder"></aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
      <header id="portal-header-placeholder"></header>

      <div class="flex-1 overflow-y-auto p-6 md:p-8">
        <div class="max-w-6xl mx-auto">
          <div
            class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4"
          >
            <div>
              <h1 class="text-2xl font-bold text-gray-900">People</h1>
              <p class="text-sm text-gray-500 mt-1">
                Manage lab faculty, students, staff, and alumni.
              </p>
            </div>
            <button
              id="add-person-btn"
              class="bg-[#C53030] text-white px-4 py-2 rounded-md text-sm font-bold hover:bg-[#A52828] transition shadow-sm flex items-center"
            >
              <i class="bx bx-plus mr-2 text-lg"></i> Add Person
            </button>
          </div>

          <div
            class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"
          >
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr
                    class="bg-gray-50 border-b border-gray-200 text-xs uppercase text-gray-500 tracking-wider"
                  >
                    <th class="p-4 font-semibold">Name & Role</th>
                    <th class="p-4 font-semibold">Category</th>
                    <th class="p-4 font-semibold">Links</th>
                    <th class="p-4 font-semibold text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="people-table-body" class="divide-y divide-gray-100">
                  <tr>
                    <td colspan="4" class="p-4 text-center text-gray-500">
                      Loading people...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div
        id="person-modal"
        class="fixed inset-0 bg-gray-900/50 z-50 hidden flex justify-end"
      >
        <div
          class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col transform transition-transform translate-x-full duration-300"
          id="person-modal-panel"
        >
          <div
            class="flex justify-between items-center p-6 border-b border-gray-200"
          >
            <h2 id="modal-title" class="text-xl font-bold text-gray-900">
              Add Person
            </h2>
            <button
              id="close-modal-btn"
              class="text-gray-400 hover:text-gray-600 text-2xl"
            >
              <i class="bx bx-x"></i>
            </button>
          </div>

          <div class="flex-1 overflow-y-auto p-6">
            <form id="person-form" class="space-y-4">
              <input type="hidden" id="person-id" />

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"
                  >Full Name *</label
                >
                <input
                  type="text"
                  id="person-name"
                  required
                  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                  placeholder="e.g., Dr. K. Santosh"
                />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Category *</label
                  >
                  <select
                    id="person-category"
                    required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none bg-white"
                  >
                    <option value="" disabled selected>Select category</option>
                    <option value="faculty">Faculty</option>
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                    <option value="alumni">Alumni</option>
                    <option value="collaborator">Collaborator</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Role / Title</label
                  >
                  <input
                    type="text"
                    id="person-role"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-[#C53030] focus:border-[#C53030] outline-none"
                    placeholder="e.g., Lab Director, PhD Student"
                  />
                </div>
              </div>

              <div>
                <label
                  class="block text-sm font-bold text-gray-700 mb-1.5"
                  for="person-photo-file"
                >
                  Profile Photo
                </label>
                <input
                  id="person-photo-file"
                  type="file"
                  accept="image/png, image/jpeg, image/webp"
                  class="w-full px-4 py-2 bg-white/50 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#C53030] focus:border-transparent transition-colors file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100"
                />
                <p class="mt-1.5 text-[11px] font-bold text-gray-500">
                  Upload a headshot (PNG, JPG, or WEBP). It will be saved
                  securely to the cloud.
                </p>
              </div>

              <div class="pt-2">
                <p
                  class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
                >
                  Professional Links
                </p>
                <div class="space-y-3">
                  <input
                    type="url"
                    id="person-scholar"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                    placeholder="Google Scholar URL"
                  />
                  <input
                    type="url"
                    id="person-dblp"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                    placeholder="DBLP URL"
                  />
                  <input
                    type="url"
                    id="person-website"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                    placeholder="Personal Website URL"
                  />
                </div>
              </div>

              <div class="pt-2" id="alumni-fields-container">
                <p
                  class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
                >
                  Alumni Information (Optional)
                </p>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <input
                      type="text"
                      id="person-degree"
                      class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                      placeholder="Degree (e.g., MS, PhD)"
                    />
                  </div>
                  <div>
                    <input
                      type="text"
                      id="person-grad-year"
                      class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                      placeholder="Grad Year (e.g., 2024)"
                    />
                  </div>
                </div>
              </div>

              <div class="pt-2">
                <label
                  class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
                  >Internal (Optional)</label
                >
                <input
                  type="text"
                  id="person-member-key"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-[#C53030] outline-none"
                  placeholder="Member Key (for custom sorting)"
                />
              </div>
            </form>
          </div>

          <div
            class="p-6 border-t border-gray-200 bg-gray-50 flex justify-end gap-3"
          >
            <button
              id="cancel-modal-btn"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
            >
              Cancel
            </button>
            <button
              id="save-person-btn"
              class="px-4 py-2 text-sm font-medium text-white bg-[#C53030] rounded-md hover:bg-[#A52828] shadow-sm flex items-center"
            >
              Save Person
            </button>
          </div>
        </div>
      </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="../js/supabase-config.js"></script>
    <script defer src="../js/portal.js"></script>
    <script defer src="../js/manage-people.js"></script>
  </body>
</html>
