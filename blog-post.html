<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Post | USD AI Research</title>
    <link rel="stylesheet" href="css/output.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* Identical Markdown styles to your editor preview */
      .prose h1 {
        font-size: 2.25rem;
        font-weight: 800;
        margin-bottom: 1rem;
        color: #111827;
        line-height: 1.2;
      }
      .prose h2 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
        color: #111827;
      }
      .prose h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        color: #111827;
      }
      .prose p {
        margin-bottom: 1.25rem;
        line-height: 1.8;
        color: #374151;
        font-size: 1.05rem;
      }
      .prose ul,
      .prose ol {
        margin-bottom: 1.25rem;
        padding-left: 1.5rem;
      }
      .prose ul {
        list-style-type: disc;
      }
      .prose ol {
        list-style-type: decimal;
      }
      .prose li {
        margin-bottom: 0.5rem;
        line-height: 1.75;
        color: #374151;
      }
      .prose code {
        background: #f3f4f6;
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.875em;
        color: #c53030;
        font-family: monospace;
      }
      .prose pre {
        background: #1f2937;
        color: #e5e7eb;
        padding: 1.25rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        margin-bottom: 1.5rem;
      }
      .prose pre code {
        background: none;
        padding: 0;
        color: inherit;
        font-size: 0.875rem;
      }
      .prose blockquote {
        border-left: 4px solid #c53030;
        padding-left: 1.25rem;
        margin-bottom: 1.5rem;
        color: #6b7280;
        font-style: italic;
        font-size: 1.1rem;
      }
      .prose a {
        color: #c53030;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .prose a:hover {
        color: #9b2c2c;
      }
      .prose img {
        max-width: 100%;
        border-radius: 0.75rem;
        margin: 2rem auto;
        display: block;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .prose hr {
        border-color: #e5e7eb;
        margin: 2rem 0;
      }
      .prose strong {
        font-weight: 700;
        color: #111827;
      }
    </style>
      <link rel="preload" as="image" href="assets/icons/logo-BHzomKBk.svg" />
    <link rel="preload" as="image" href="assets/backgrounds/building-bg.webp" />
</head>
  <body
    class="font-sans text-gray-900 bg-cover bg-center bg-fixed bg-no-repeat"
    style="
      background-image: url(&quot;assets/backgrounds/building-bg.webp&quot;);
    "
  >
    <div id="navbar-placeholder" class="min-h-16 sticky top-0 z-50"></div>

    <div
      class="py-6 px-4 sm:px-6 lg:px-8 min-h-[calc(100vh-8rem)] flex flex-col items-center"
    >
      <main
        class="w-full max-w-4xl bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border border-white/40 overflow-hidden flex flex-col relative"
      >
        <div class="p-6 pb-0">
          <a
            href="blog.html"
            class="inline-flex items-center text-gray-500 hover:text-[#C53030] font-bold text-sm transition-colors group"
          >
            <i
              class="bx bx-arrow-back text-lg mr-1.5 group-hover:-translate-x-1 transition-transform"
            ></i>
            Back to Blog
          </a>
        </div>

        <div
          id="post-loading"
          class="flex flex-col items-center justify-center py-32"
        >
          <div
            class="w-10 h-10 border-4 border-gray-200 border-t-[#C53030] rounded-full animate-spin mb-4"
          ></div>
          <p class="text-gray-500 font-bold">Loading article...</p>
        </div>

        <div
          id="post-error"
          class="hidden flex flex-col items-center justify-center py-32 text-center px-6"
        >
          <i class="bx bx-error-circle text-6xl text-gray-300 mb-4"></i>
          <h2 class="text-2xl font-bold text-gray-900 mb-2">Post not found</h2>
          <p class="text-gray-500 mb-6">
            The article you're looking for might have been removed, had its name
            changed, or is temporarily unavailable.
          </p>
          <a
            href="blog.html"
            class="px-6 py-2.5 bg-[#C53030] text-white font-bold rounded-xl hover:bg-red-800 transition shadow"
            >Return to Blog</a
          >
        </div>

        <article id="post-container" class="hidden flex-col w-full pb-12">
          <header
            class="px-8 md:px-16 pt-8 pb-8 text-center border-b border-gray-100"
          >
            <div
              id="post-tags"
              class="flex items-center justify-center gap-2 mb-4 flex-wrap"
            ></div>

            <h1
              id="post-title"
              class="text-3xl md:text-5xl font-extrabold text-gray-900 tracking-tight leading-tight mb-6"
            ></h1>

            <div
              class="flex items-center justify-center gap-4 text-sm font-medium text-gray-500"
            >
              <div class="flex items-center gap-1.5">
                <i class="bx bx-user-circle text-lg text-gray-400"></i>
                <span id="post-author" class="text-gray-700 font-bold"
                  >Unknown Author</span
                >
              </div>
              <span class="w-1 h-1 rounded-full bg-gray-300"></span>
              <div class="flex items-center gap-1.5">
                <i class="bx bx-calendar text-lg text-gray-400"></i>
                <span id="post-date">Publish Date</span>
              </div>
            </div>
          </header>

          <div
            id="post-cover-container"
            class="w-full h-64 md:h-96 overflow-hidden bg-gray-100 hidden relative shadow-inner"
          >
            <img loading="lazy" decoding="async" id="post-cover-image"
              src=""
              alt="Cover Image"
              class="w-full h-full object-cover"
            />
          </div>

          <div class="px-8 md:px-16 pt-10">
            <div id="post-content" class="prose max-w-none"></div>
          </div>
        </article>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="js/supabase-config.js"></script>
    <script defer src="js/navbar.js"></script>
    <script defer src="js/blog-post.js"></script>
    <script defer src="js/loader.js"></script>
  </body>
</html>
