name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # This opens up an endpoint for Supabase to hit
  repository_dispatch:
    types: [supabase_update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # --- NEW: Cache Step ---
      - name: Cache Supabase Assets
        uses: actions/cache@v3
        with:
          path: assets/books/
          key: supabase-book-covers-${{ github.run_id }}
          restore-keys: |
            supabase-book-covers-

      - name: Build Static Data and CSS
        env:
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          node scripts/download-assets.js
          node js/build.js
          npx tailwindcss -i ./css/input.css -o ./css/output.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
